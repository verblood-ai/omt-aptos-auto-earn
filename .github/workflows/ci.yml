name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Secret hygiene guard
        run: |
          python - <<'PY'
          import subprocess
          import sys

          forbidden = {
              ".env",
              "data/wallet.json",
              "data/faucet_state.json",
              "data/airdrop_state.json",
              "data/metrics.duckdb",
          }
          tracked = set(
              line.strip()
              for line in subprocess.check_output(["git", "ls-files"], text=True).splitlines()
              if line.strip()
          )
          violations = sorted(forbidden.intersection(tracked))
          if violations:
              print("Forbidden runtime/secret files are tracked in git:")
              for item in violations:
                  print(f" - {item}")
              sys.exit(1)
          print("Secret hygiene guard passed")
          PY
      - name: Unit tests
        run: |
          python -m unittest discover -s tests -v
