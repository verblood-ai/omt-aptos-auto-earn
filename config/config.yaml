# Aptos Auto Earn - Configuration
# Copy and modify as needed

# Network configuration
# Stage 4 эталон: testnet (пакеты Liquidswap стабильнее, чем на devnet после reset).
network: testnet
node_url: "https://fullnode.testnet.aptoslabs.com/v1"

# Faucet configuration
faucet:
  max_claims_per_day: 1
  cooldown_hours: 24
  api_url: "https://faucet.testnet.aptoslabs.com/mint"
  amount: 100000000  # faucet amount is always in octas (100000000 octas = 1 APT)

# Activity configuration
activity:
  enabled: true
  min_interval_minutes: 30
  allow_stubs: false
  modules:
    - "dex_swap"
  # DEX: 1_000_000 octas = 0.01 APT; slippage 1% — запас для testnet-пула APT/USDT
  dex_swap_amount: 1000000
  dex_slippage: 0.01

# Airdrop monitoring
airdrop:
  enabled: true
  check_interval_hours: 6
  aptos_currents_url: "https://aptosfoundation.org/currents"
  sources:
    - "aptos_currents"

# Orchestrator schedule (long-lived `run.py`; local server time for faucet)
scheduler:
  faucet_daily_at: "09:00"
  activity_interval_hours: 6
  airdrop_interval_hours: 6
  balance_interval_hours: 1

# Logging
logging:
  level: "INFO"
  file: "logs/aptos_auto_earn.log"
  rotation: "1 day"
  retention: "7 days"

# Metrics
metrics:
  db_path: "data/metrics.duckdb"

# Telegram notifications
telegram:
  enabled: false
  bot_token: ""
  chat_id: ""

# Contract addresses for activity modules
contracts:
  # Liquidswap V2 (scripts_v2, router_v2) — проверено GET …/modules на 2026-04-20; см. docs/DEX.md
  liquidswap_router: "0x190d44266241744264b964a37b8f09863167a12d3e70cda39376cfb4e3561e12"
  liquidswap_resource_account: "0x05a97986a9d031c4567e15b797be516910cfcb4156312482efc6a19c0a30c948"
  # Пакет тестовых монет Pontem (::coins::USDT); не путать с liquidswap_router
  liquidswap_test_coins: "0x43417434fd869edee76cca2a4d2301e528a1551b1d719b75c350c3c97d15b8b9"
  
  # Aave V3 on Aptos (mainnet addresses, may not be on devnet)
  aave_pool: "0x2c5e8a45b9a86b4c1a77c5e9a4a4b2e8a45b9a86b4c1a77c5e9a4a4b2e8a45b9a"  # placeholder
  aave_oracle: "0x3c5e8a45b9a86b4c1a77c5e9a4a4b2e8a45b9a86b4c1a77c5e9a4a4b2e8a45b9a"  # placeholder
  
  # NFT marketplaces (testnet/devnet)
  nft_marketplace: "0x4c5e8a45b9a86b4c1a77c5e9a4a4b2e8a45b9a86b4c1a77c5e9a4a4b2e8a45b9a"  # placeholder

# Readiness gate before activity execution
readiness:
  enabled: true
  fail_mode: "closed"  # closed | open
  signal_ttl_seconds: 900
  mandatory_checks:
    - "rpc_health"
    - "min_balance_guard"
    - "dex_preflight"
  min_balance_apt: 0.0
  require_dex_preflight: true
  require_faucet_eligibility: false
  dedup_log_window_seconds: 300

# Unified retry/backoff policies
retry:
  rpc:
    attempts: 3
    base_delay_seconds: 1.0
    max_delay_seconds: 8.0
    jitter_ratio: 0.1
  faucet_http:
    attempts: 3
    base_delay_seconds: 1.0
    max_delay_seconds: 16.0
    jitter_ratio: 0.1
  scraping:
    attempts: 3
    base_delay_seconds: 1.0
    max_delay_seconds: 16.0
    jitter_ratio: 0.1

# KPI evaluation and alerts
kpi_alerts:
  enabled: false
  window_hours: 24
  evaluation_interval_minutes: 30
  cooldown_minutes: 120
  enabled_kpis:
    - "skip_rate"
    - "success_rate"
    - "retry_burst"
    - "faucet_claim_gap"
    - "airdrop_check_staleness"
  skip_rate_warn: 0.30
  skip_rate_critical: 0.50
  success_rate_warn: 0.80
  success_rate_critical: 0.60
  retry_burst_warn: 4
  retry_burst_critical: 8
  faucet_claim_gap_warn_hours: 30
  faucet_claim_gap_critical_hours: 48
  airdrop_check_staleness_warn_hours: 12
  airdrop_check_staleness_critical_hours: 24

# Strategy/policy engine (Iter.2)
strategy:
  enabled: false
  mode: "shadow"   # shadow | advisory | enforcement
  force_mode: ""   # "", shadow, advisory
  advisory_cooldown_minutes: 60
  policy:
    enabled: true
    window_hours: 24
    skip_budget: 12
    retry_budget: 8
    failed_runs_budget: 6
    execution_budget: 200
    advisory_ratio: 0.85
    warning_ratios: [0.70, 0.85, 0.95]
    module_overrides: {}
